<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>견적서 진위확인 · ㈜아리텍바이오</title>
<style>
  :root{ --bg:#f5f6f8; --card:#fff; --tx:#1a1d21; --sub:#666; --line:#e3e6ea; --brand:#0b7d4f; --ok:#0b7d4f; --bad:#c0392b; --warn:#b8860b; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#14171a; --card:#1e2226; --tx:#e8eaed; --sub:#9aa0a6; --line:#2c3136; --brand:#3ecf8e; --ok:#3ecf8e; --bad:#ff6b6b; --warn:#e0b341; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:24px 16px 60px}
  h1{font-size:20px;margin:0 0 4px}
  .brand{color:var(--brand);font-weight:700}
  .sub{color:var(--sub);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  label{font-size:13px;color:var(--sub);display:block;margin-bottom:6px}
  textarea{width:100%;min-height:96px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;font-family:ui-monospace,Consolas,monospace;background:var(--bg);color:var(--tx);resize:vertical}
  button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:10px;background:var(--brand);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  button:active{opacity:.85}
  .result{display:none;margin-top:4px}
  .badge{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;padding:14px;border-radius:10px}
  .badge.ok{background:color-mix(in srgb,var(--ok) 14%,transparent);color:var(--ok)}
  .badge.bad{background:color-mix(in srgb,var(--bad) 14%,transparent);color:var(--bad)}
  .badge.warn{background:color-mix(in srgb,var(--warn) 16%,transparent);color:var(--warn)}
  table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
  th,td{text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--sub);font-weight:600;width:38%;white-space:nowrap}
  td.amt{font-weight:800}
  .note{font-size:12px;color:var(--sub);margin-top:14px}
  .foot{font-size:12px;color:var(--sub);text-align:center;margin-top:28px}
</style>
</head>
<body>
<div class="wrap">
  <h1>견적서 진위확인</h1>
  <div class="sub"><span class="brand">㈜아리텍바이오</span> 정식 발행 견적서 검증 서비스</div>

  <div class="card">
    <label>견적서 QR을 스캔한 내용(문자)을 붙여넣고 [진위 확인]을 누르세요.</label>
    <textarea id="in" placeholder='{"site":"...","name":"...","total":...,"sig":"..."}'></textarea>
    <button onclick="verify()">진위 확인</button>
  </div>

  <div class="result card" id="res"></div>

  <div class="note">
    · 본 페이지는 견적 내용을 저장·전송하지 않으며, 검증은 고객 브라우저 안에서만 이뤄집니다.<br>
    · 금액 등 어떤 내용이라도 변조되면 <b>위조</b>로 표시됩니다.<br>
    · 의심되면 발행처 ☎ 02-553-5155 (㈜아리텍바이오)로 확인하세요.
  </div>
  <div class="foot">© ㈜아리텍바이오 · 620-86-03047</div>
</div>

<script>
// 발행처가 등록한 '진본 해시' 목록 (금액 등 원문 정보는 포함되지 않음)
const HASHES = new Set(["9ccfaeac46888dbe74e1fd198c4d0612c24f97423365e5b7583e31875a709103"]);

function canonical(o){
  const k=Object.keys(o).sort();
  return '{'+k.map(x=>JSON.stringify(x)+':'+JSON.stringify(o[x])).join(',')+'}';
}
async function sha256hex(s){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function won(n){try{return Number(n).toLocaleString('ko-KR')+' 원';}catch(e){return n;}}
function row(label,val){return '<tr><th>'+label+'</th><td>'+val+'</td></tr>';}

async function verify(){
  const res=document.getElementById('res');
  res.style.display='block';
  let raw=document.getElementById('in').value.trim();
  if(!raw){res.innerHTML='<div class="badge warn">⚠️ 내용을 붙여넣어 주세요</div>';return;}

  // 문서확인번호(12자리)만 입력한 경우 안내
  if(/^[0-9A-Fa-f]{12}$/.test(raw)){
    res.innerHTML='<div class="badge warn">ⓘ 문서확인번호만으로는 상세확인이 어렵습니다</div>'+
      '<div class="note">QR을 스캔한 <b>전체 내용</b>(중괄호 { } 로 시작하는 문자)을 붙여넣어 주세요.</div>';
    return;
  }

  let p;
  try{ p=JSON.parse(raw); }
  catch(e){ res.innerHTML='<div class="badge bad">❌ 형식 오류</div><div class="note">QR 스캔 내용(JSON)을 그대로 붙여넣어 주세요.</div>'; return; }

  const h=await sha256hex(canonical(p));
  const docId=(p.sig||'').slice(0,12).toUpperCase();

  if(HASHES.has(h)){
    res.innerHTML='<div class="badge ok">✅ 진본입니다</div>'+
      '<div style="font-size:13px;color:var(--sub);margin-top:8px">㈜아리텍바이오가 발행한 정식 견적서이며, 내용이 변조되지 않았습니다.</div>'+
      '<table>'+
      row('현장명', esc(p.site))+
      row('견적명', esc(p.name))+
      row('공급자 등록번호', esc(p.biz))+
      row('견적일', esc(p.date))+
      '<tr><th>견적금액(VAT 포함)</th><td class="amt">'+won(p.total)+'</td></tr>'+
      row('문서확인번호', docId)+
      '</table>'+
      '<div class="note">※ 위 금액이 받으신 PDF 견적서 금액과 같은지 반드시 대조하세요.</div>';
  }else{
    res.innerHTML='<div class="badge bad">❌ 위조 또는 미등록 문서</div>'+
      '<div class="note">이 내용은 ㈜아리텍바이오 발행 진본 목록에 없습니다. '+
      '내용이 변조되었거나 정식 발행본이 아닙니다. 발행처(02-553-5155)로 확인하세요.<br>'+
      (docId?('입력된 문서확인번호: '+docId):'')+'</div>';
  }
}

// QR이 URL(#p=...)로 열린 경우 자동 검증 (향후 견적서용)
window.addEventListener('DOMContentLoaded',()=>{
  const m=location.hash.match(/[#&]p=([^&]+)/);
  if(m){ try{ document.getElementById('in').value=decodeURIComponent(escape(atob(m[1].replace(/-/g,'+').replace(/_/g,'/')))); verify(); }catch(e){} }
});
</script>
</body>
</html>
